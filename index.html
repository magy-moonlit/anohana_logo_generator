<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>あの花ロゴジェネレーター</title>
    <meta name="description" content="サイトキャプションを入力" />
    <meta name="keywords" content="サイトキーワードを,で区切って入力" />
    <style type="text/css">
      html {
        width: 100%;
        height: 100%;
      }
      body {
        width: 1020px;
        height: 100%;
        margin: auto;
      }
      p {
        writing-mode: vertical-rl;
        font-size: 100px;
        margin: 14px;
        margin-top: 100px;
        font-family: serif;
        letter-spacing: 36px;
        white-space: nowrap;
      }

      #output_area {
        width: 100%;
        display: flex;
        margin-top: 100px;
        justify-content: center;
        min-height: 100vh;
        padding-bottom: 200px;
        background-image: url("background2.png");
        background-size: 80%;
        background-repeat: no-repeat;
        background-position: 50% 0px;
      }

      #line4 {
        margin-top: 230px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  </head>

  <body>
    <div id="input_area">
      <section>
        <input type="text" id="input1" />
        <input type="text" id="input2" />
        <input type="text" id="input3" />
        <input type="text" id="input4" />
      </section>
      <button id="save_btn">画像を保存</button>
    </div>

    <div id="output_area">
        <p id="line4">知らない。</p>
        <p id="line3">僕達はまだ</p>
        <p id="line2">花の名前を</p>
        <p id="line1">あの日見た</p>
    </div>

    <script>
      function inputChange1(event) {
        document.getElementById("line1").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input1").addEventListener("input", inputChange1);

      function inputChange2(event) {
        document.getElementById("line2").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input2").addEventListener("input", inputChange2);

      function inputChange3(event) {
        document.getElementById("line3").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input3").addEventListener("input", inputChange3);

      function inputChange4(event) {
        document.getElementById("line4").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input4").addEventListener("input", inputChange4);

      document.getElementById("save_btn").addEventListener("click", function () {
        html2canvas(document.getElementById("output_area"), { useCORS: true, allowTaint: true }).then(function (canvas) {
          var a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "anohana.png";
          a.click();
        });
      });
    </script>
  </body>
</html>
