<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="jGdVQmYnVA9Ou_k2yoxSJkAh9RCm8avjtoDp4GJwDa0" />
    <title>あの花ロゴジェネレーター - 「あの日見た花の名前を僕達はまだ知らない。」風ロゴ画像生成</title>
    <meta name="description" content="アニメ「あの日見た花の名前を僕達はまだ知らない。」風のロゴ画像を無料で作成・保存できるファンメイドジェネレーターです。4行のテキストと背景を自由にカスタマイズできます。" />
    <meta name="keywords" content="あの花,ロゴジェネレーター,あの日見た花の名前を僕達はまだ知らない,ロゴ作成,アニメロゴ,画像生成" />
    <link rel="canonical" href="https://magy-moonlit.github.io/anohana_logo_generator/" />
    <meta property="og:title" content="あの花ロゴジェネレーター" />
    <meta property="og:description" content="「あの日見た花の名前を僕達はまだ知らない。」風のロゴ画像を無料で作成・保存できるジェネレーター" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://magy-moonlit.github.io/anohana_logo_generator/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="あの花ロゴジェネレーター" />
    <meta name="twitter:description" content="「あの日見た花の名前を僕達はまだ知らない。」風のロゴ画像を無料で作成・保存できるジェネレーター" />
    <style type="text/css">
      html {
        width: 100%;
        height: 100%;
      }
      body {
        width: 1020px;
        height: 100%;
        margin: auto;
      }
      p {
        writing-mode: vertical-rl;
        font-size: 100px;
        margin: 14px;
        margin-top: 100px;
        font-family: serif;
        line-height: 1.8;
        white-space: nowrap;
      }

      #output_area {
        width: 100%;
        display: flex;
        margin-top: 100px;
        justify-content: center;
        min-height: 100vh;
        padding-bottom: 200px;
        background-image: url("background_flower.png");
        background-size: 80%;
        background-repeat: no-repeat;
        background-position: 50% 0px;
      }

      #line4 {
        margin-top: 230px;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.5/dist/dom-to-image-more.min.js"></script>
  </head>

  <body>
    <div id="input_area">
      <section>
        <input type="text" id="input1" />
        <input type="text" id="input2" />
        <input type="text" id="input3" />
        <input type="text" id="input4" />
        <select id="bg_select">
          <option value="background_flower.png">花</option>
          <option value="background_note.png">音符</option>
        </select>
      </section>
      <button id="save_btn">画像を保存</button>
    </div>

    <div id="output_area">
        <p id="line4">知らない。</p>
        <p id="line3">僕達はまだ</p>
        <p id="line2">花の名前を</p>
        <p id="line1">あの日見た</p>
    </div>

    <script>
      function inputChange1(event) {
        document.getElementById("line1").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input1").addEventListener("input", inputChange1);

      function inputChange2(event) {
        document.getElementById("line2").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input2").addEventListener("input", inputChange2);

      function inputChange3(event) {
        document.getElementById("line3").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input3").addEventListener("input", inputChange3);

      function inputChange4(event) {
        document.getElementById("line4").innerHTML = event.currentTarget.value;
      }
      document.getElementById("input4").addEventListener("input", inputChange4);

      document.getElementById("bg_select").addEventListener("change", function (event) {
        document.getElementById("output_area").style.backgroundImage = 'url("' + event.currentTarget.value + '")';
      });

      document.getElementById("save_btn").addEventListener("click", function () {
        var node = document.getElementById("output_area");
        domtoimage.toPng(node, { width: node.scrollWidth, height: node.scrollHeight }).then(function (dataUrl) {
          var a = document.createElement("a");
          a.href = dataUrl;
          a.download = "anohana.png";
          a.click();
        });
      });
    </script>
  </body>
</html>
